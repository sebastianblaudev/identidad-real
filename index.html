<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identidad Real | Mentor Espiritual AI</title>
    <meta name="description" content="Transforma etiquetas negativas en verdades bíblicas de identidad.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #003876; /* Lumbreras Navy */
            --secondary: #00a651; /* Lumbreras Green */
            --accent: #ffc107; /* Lumbreras Gold */
            --bg-dark: #0a0f1d; 
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            background: radial-gradient(circle at top left, #001d3d, transparent),
                        radial-gradient(circle at bottom right, #004b23, transparent),
                        var(--bg-dark);
        }

        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.05;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Cfilter id='noiseFilter'%3%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3%3C/filter%3%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3%3C/svg%3");
        }

        .container {
            width: 90%;
            max-width: 500px;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #94a3b8;
            font-size: 0.95rem;
            font-weight: 300;
            letter-spacing: 0.5px;
        }

        .input-group {
            position: relative;
            margin-bottom: 2rem;
        }

        input {
            width: 100%;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 1.2rem 1.5rem;
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .btn-transform {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border: none;
            border-radius: 16px;
            padding: 1.2rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4);
        }

        .btn-transform:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(139, 92, 246, 0.5);
        }

        .btn-transform:active {
            transform: translateY(0);
        }

        .btn-transform:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #result-area {
            margin-top: 2.5rem;
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 1.5rem;
            border-left: 4px solid var(--accent);
        }

        .result-identity {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--accent);
        }

        .result-verse {
            font-style: italic;
            font-family: 'Playfair Display', serif;
            line-height: 1.6;
            margin-bottom: 1rem;
            color: #e2e8f0;
        }

        .result-motivation {
            font-weight: 600;
            color: #a78bfa;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #64748b;
        }

        .api-note {
            font-size: 0.7rem;
            margin-top: 1rem;
            opacity: 0.5;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="noise"></div>
    
    <div class="container" id="app">
        <div class="card">
            <header>
                <i data-lucide="sparkles" style="color: var(--accent); margin-bottom: 1rem;"></i>
                <h1>Identidad Real</h1>
                <p class="subtitle">Escribe esa etiqueta que el mundo te puso.</p>
            </header>

            <div class="input-group">
                <input type="text" id="label-input" placeholder="Ej: Soy un fracasado, Invisible, Sin valor..." autocomplete="off">
            </div>

            <button class="btn-transform" id="transform-btn">
                <span id="btn-text">Transformar Identidad</span>
                <div class="loader" id="loader"></div>
            </button>

            <div id="result-area">
                <div class="result-card" id="result-content">
                    <!-- El resultado se inyectará aquí -->
                </div>
            </div>

            <p class="api-note" onclick="setupApiKey()">Configurar API Key (Google Gemini)</p>
        </div>

        <footer>
            Hecho con fe por tu Mentor Espiritual AI | Potenciado por Gemini
        </footer>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        const input = document.getElementById('label-input');
        const btn = document.getElementById('transform-btn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        const resultArea = document.getElementById('result-area');
        const resultContent = document.getElementById('result-content');

        // Almacenamos la clave de Gemini
        let GEMINI_API_KEY = localStorage.getItem('gemini_api_key') || "AIzaSyBcmTTqEyRXeBvcohMZrxmh0sQZdzg1CKA";

        function setupApiKey() {
            const key = prompt("Ingresa tu API Key de Google Gemini (obtenla gratis en aistudio.google.com):", GEMINI_API_KEY);
            if (key !== null) {
                localStorage.setItem('gemini_api_key', key);
                GEMINI_API_KEY = key;
                alert("API Key de Gemini configurada correctamente.");
            }
        }

        async function transformIdentity(label) {
            if (!GEMINI_API_KEY) {
                alert("Por favor, configura tu API Key de Gemini haciendo clic en la nota inferior.");
                return;
            }

            setLoading(true);

            const systemPrompt = `Actúa como un Mentor Espiritual empático para la Gen Z. 
            Misión: Alquimia de Identidad. Toma una etiqueta negativa y conviértela en identidad bíblica. 
            Formato: 
            ✨ [Identidad Poderosa]
            📖 [Versículo y Cita]
            🔥 [Frase Motivadora Corta]
            Máximo 280 caracteres. No des introducciones ni explicaciones.`;

            const promptText = `Etiqueta externa: "${label}". Genera la Alquimia de Identidad:`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: systemPrompt + "\n\n" + promptText }]
                        }],
                        generationConfig: {
                            temperature: 0.8,
                            maxOutputTokens: 200
                        }
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const resultText = data.candidates[0].content.parts[0].text;
                displayResult(resultText);
            } catch (error) {
                console.error(error);
                alert("Error con Gemini: " + error.message);
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            btn.disabled = isLoading;
            loader.style.display = isLoading ? 'block' : 'none';
            btnText.style.display = isLoading ? 'none' : 'block';
        }

        function displayResult(text) {
            const lines = text.trim().split('\n').filter(l => l.trim() !== "");
            
            let html = "";
            lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed.includes('✨')) {
                    html += `<div class="result-identity">${trimmed.replace('✨', '').trim()}</div>`;
                } else if (trimmed.includes('📖')) {
                    html += `<div class="result-verse">${trimmed.replace('📖', '').trim()}</div>`;
                } else if (trimmed.includes('🔥')) {
                    html += `<div class="result-motivation">${trimmed.replace('🔥', '').trim()}</div>`;
                } else if (trimmed !== "") {
                    html += `<div style="margin-bottom:0.5rem">${trimmed}</div>`;
                }
            });

            if (!html) html = `<div class="result-verse">${text}</div>`;

            resultContent.innerHTML = html;
            resultArea.style.display = 'block';
        }

        btn.addEventListener('click', () => {
            const val = input.value.trim();
            if (val) {
                transformIdentity(val);
            } else {
                alert("Por favor escribe una etiqueta.");
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
