<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identidad Real | Mentor Espiritual AI</title>
    <meta name="description" content="Transforma etiquetas negativas en verdades bíblicas de identidad.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400..900;1,400..900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #003876; /* Lumbreras Navy */
            --secondary: #00a651; /* Lumbreras Green */
            --accent: #ffc107; /* Lumbreras Gold */
            --bg: #fdfdfd; 
            --text-dark: #1e293b;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .container {
            width: 100%;
            max-width: 480px;
            z-index: 10;
        }

        .card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 3rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 
                        0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #64748b;
            font-size: 0.95rem;
            font-weight: 400;
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        input {
            width: 100%;
            background: #f8fafc;
            border: 2px solid var(--border);
            border-radius: 12px;
            padding: 1rem 1.2rem;
            color: var(--text-dark);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            background: white;
        }

        .btn-transform {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
        }

        .btn-transform:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-transform:active {
            transform: translateY(0);
        }

        #result-area {
            margin-top: 2rem;
            display: none;
        }

        .result-card {
            background: #f8fafc;
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            border-left: 6px solid var(--accent);
            word-wrap: break-word;
            overflow: visible;
        }

        .result-identity {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: var(--primary);
        }

        .result-verse {
            font-style: italic;
            font-family: 'Playfair Display', serif;
            line-height: 1.6;
            margin-bottom: 1rem;
            color: #334155;
        }

        .result-motivation {
            font-weight: 600;
            color: var(--secondary);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .api-note {
            display: block;
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.5rem;
            color: #94a3b8;
            text-decoration: underline;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <div class="card">
            <header>
                <i data-lucide="sparkles" style="color: var(--accent); margin-bottom: 0.5rem;"></i>
                <h1>Identidad Real</h1>
                <p class="subtitle">¡Es el momento del Unboxing de tu identidad real!</p>
            </header>

            <div class="input-group">
                <input type="text" id="label-input" placeholder="Ej: Soy un fracasado, Invisible, Sin valor..." autocomplete="off">
            </div>

            <button class="btn-transform" id="transform-btn">
                <span id="btn-text">Transformar Identidad</span>
                <div class="loader" id="loader"></div>
            </button>

            <div id="result-area">
                <div class="result-card" id="result-content">
                    <!-- El resultado se inyectará aquí -->
                </div>
            </div>

        <footer>
            Hecho con fe por tu Mentor Espiritual AI | Potenciado por Gemini
        </footer>
    </div>

    <script>
        // Inicializar iconos
        lucide.createIcons();

        const input = document.getElementById('label-input');
        const btn = document.getElementById('transform-btn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btn-text');
        const resultArea = document.getElementById('result-area');
        const resultContent = document.getElementById('result-content');

        async function transformIdentity(label) {
            setLoading(true);

            const systemPrompt = `Actúa como un Mentor Espiritual empático para la Gen Z. 
            Misión: Unboxing de Identidad Real. Ayuda a los chicos a quitarse la "máscara" o etiqueta que el mundo les puso y revela su diseño original. 
            Formato: 
            ✨ [Identidad del Reino]
            📖 [Versículo y Cita]
            🔥 [Verdad de Dios para ti]
            Máximo 280 caracteres. No des introducciones ni explicaciones.`;

            const promptText = `Etiqueta externa: "${label}". Genera la Alquimia de Identidad:`;

            try {
                // Llamamos a nuestro proxy local en lugar de a Google directamente
                const response = await fetch(`./proxy.php`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{ text: systemPrompt + "\n\n" + promptText }]
                        }],
                        generationConfig: {
                            temperature: 0.8,
                            maxOutputTokens: 200
                        }
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message || data.error);
                }

                const resultText = data.candidates[0].content.parts[0].text;
                displayResult(resultText);
            } catch (error) {
                console.error(error);
                alert("Error con el servicio: " + error.message);
            } finally {
                setLoading(false);
            }
        }

        function setLoading(isLoading) {
            btn.disabled = isLoading;
            loader.style.display = isLoading ? 'block' : 'none';
            btnText.style.display = isLoading ? 'none' : 'block';
        }

        function displayResult(text) {
            const lines = text.trim().split('\n').filter(l => l.trim() !== "");
            
            let html = "";
            lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed.includes('✨')) {
                    html += `<div class="result-identity">${trimmed.replace('✨', '').trim()}</div>`;
                } else if (trimmed.includes('📖')) {
                    html += `<div class="result-verse">${trimmed.replace('📖', '').trim()}</div>`;
                } else if (trimmed.includes('🔥')) {
                    html += `<div class="result-motivation">${trimmed.replace('🔥', '').trim()}</div>`;
                } else if (trimmed !== "") {
                    html += `<div style="margin-bottom:0.5rem">${trimmed}</div>`;
                }
            });

            if (!html) html = `<div class="result-verse">${text}</div>`;

            resultContent.innerHTML = html;
            resultArea.style.display = 'block';
        }

        btn.addEventListener('click', () => {
            const val = input.value.trim();
            if (val) {
                transformIdentity(val);
            } else {
                alert("Por favor escribe una etiqueta.");
            }
        });

        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') btn.click();
        });
    </script>
</body>
</html>
